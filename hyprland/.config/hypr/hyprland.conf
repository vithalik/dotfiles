env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = LIBVA_DRIVER_NAME,nvidia
env = HYPRCURSOR_THEME,macOS
env = HYPRCURSOR_SIZE,32
env = XCURSOR_SIZE,32
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

#   _____  _____  ___
#  / _ \ \/ / _ \/ __|
# |  __/>  <  __/ (__
#  \___/_/\_\___|\___|

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swaybg -c 000000 
exec-once = waybar &
exec-once = wlsunset -t 2800 -T 6500 -l 53.9 -L 27.6 -d 1800
exec-once = hypridle
exec-once = udiskie
exec-once = dunst
exec-once = blueman-applet
exec-once = nm-applet
exec-once = ~/.config/hypr/scripts/kb_layout.sh
exec-once = telegram-desktop

exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data

#                        _ _
#  _ __ ___   ___  _ __ (_) |_ ___  _ __
# | '_ ` _ \ / _ \| '_ \| | __/ _ \| '__|
# | | | | | | (_) | | | | | || (_) | |
# |_| |_| |_|\___/|_| |_|_|\__\___/|_|

monitor = , preferred, auto, 1

#           _           _                          _
# __      _(_)_ __   __| | _____      ___ __ _   _| | ___  ___
# \ \ /\ / / | '_ \ / _` |/ _ \ \ /\ / / '__| | | | |/ _ \/ __|
#  \ V  V /| | | | | (_| | (_) \ V  V /| |  | |_| | |  __/\__ \
#   \_/\_/ |_|_| |_|\__,_|\___/ \_/\_/ |_|   \__,_|_|\___||___/
windowrule {
  name = telegram
  match:class = org.telegram.desktop
  workspace = 3 silent
  pseudo = on
  size = 1002 1392
}

windowrule {
  name = mumble
  match:class = info.mumble.Mumble
  pseudo = on
  size = 773 498
}

windowrule {
  name = signal
  match:class = signal
  pseudo = on
  size = 874 1212
}

windowrule {
	name = blueman
	match:class = blueman-manager
	float = on
	center = on
	size = 529 344
}

windowrule = match:class steam, workspace 5
windowrule = match:title ^(File Operation Progress)$, float on
windowrule = match:class ^(.*dev-linux-amd64)$, float on
windowrule = match:class ^(qemu-system-x86_64)$, tile on
windowrule = match:class ^(Vtk)$, tile on
windowrule = match:class foot, size 1416 1416

workspace = special:notes, on-created-empty:[pseudo; size 950 1200] foot -D ~/Documents/notes nvim
workspace = special:calculator, on-created-empty:[pseudo; size 700 800] foot numr

layerrule {
	name = vicinae
	match:class = vicinae
	blur = 1
	ignore_alpha = 0
	no_anim = true
}

#  _                   _
# (_)_ __  _ __  _   _| |_
# | | '_ \| '_ \| | | | __|
# | | | | | |_) | |_| | |_
# |_|_| |_| .__/ \__,_|\__|
#         |_|

input {
    kb_layout = us,ru
    kb_options = grp:rctrl_toggle
    follow_mouse = 1
    repeat_delay = 450
    accel_profile = flat
    numlock_by_default = true
}

#                                  _
#   __ _  ___ _ __   ___ _ __ __ _| |
#  / _` |/ _ \ '_ \ / _ \ '__/ _` | |
# | (_| |  __/ | | |  __/ | | (_| | |
#  \__, |\___|_| |_|\___|_|  \__,_|_|
#  |___/

general {
    gaps_in = 2
    gaps_out = 0
    border_size = 2
    col.active_border = rgb(b3b3b3)
    col.inactive_border = rgb(30302F)
}

#      _                          _   _
#   __| | ___  ___ ___  _ __ __ _| |_(_) ___  _ __
#  / _` |/ _ \/ __/ _ \| '__/ _` | __| |/ _ \| '_ \
# | (_| |  __/ (_| (_) | | | (_| | |_| | (_) | | | |
#  \__,_|\___|\___\___/|_|  \__,_|\__|_|\___/|_| |_|

decoration {
    blur {
        enabled = false
        size = 2
        passes = 2
    }
    shadow {
        enabled = true
        range = 40
        render_power = 2
        color = rgba(00000050)
        offset = 0 5
        scale = 0.99
    }
    rounding = 9
}

#              _                 _   _
#   __ _ _ __ (_)_ __ ___   __ _| |_(_) ___  _ __
#  / _` | '_ \| | '_ ` _ \ / _` | __| |/ _ \| '_ \
# | (_| | | | | | | | | | | (_| | |_| | (_) | | | |
#  \__,_|_| |_|_|_| |_| |_|\__,_|\__|_|\___/|_| |_|

animations {
    enabled = true
       
    bezier = myBezier, 0.05, 0.9, 0.1, 1.0
    
    animation = windows, 1, 1.5, myBezier
    animation = border, 1, 3, myBezier
    animation = fade, 1, 0.7, myBezier
    animation = workspaces, 0, 1.5, default, fade
    animation = layers, 1, 1.5, default, default
}
#  _     _           _
# | |__ (_)_ __   __| |___
# | '_ \| | '_ \ / _` / __|
# | |_) | | | | | (_| \__ \
# |_.__/|_|_| |_|\__,_|___/


$mod = SUPER

bind = $mod, ESCAPE, exec, rofi -show power_menu -modes 'power_menu:~/dotfiles/rofi/.config/rofi/scripts/power_menu.sh'
bind = $mod, RETURN, exec, foot
bind = $mod, e, exec, nemo
bind = $mod, b, exec, brave-beta
bind = $mod, x, exec, hyprctl kill
bind = $mod, d, exec, rofi -show drun -display-drun 'Apps'
bind = $mod, q, killactive,
bind = $mod, p, pseudo, # dwindle
bind = $mod, f, fullscreen
bind = $mod SHIFT, f, togglefloating,
bind = $mod, bracketleft, exec, rofi -show emoji
bind = $mod, u, togglegroup

bind = $mod, c, sendshortcut, CTRL, Insert,
bind = $mod, v, sendshortcut, SHIFT, Insert,
bind = $mod, a, sendshortcut, CTRL, a,
bind = $mod, z, sendshortcut, CTRL, z,
bind = $mod SHIFT, z, sendshortcut, CTRL SHIFT, z,

bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

bind = $mod CTRL, h, movewindow, l
bind = $mod CTRL, l, movewindow, r
bind = $mod CTRL, k, movewindow, u
bind = $mod CTRL, j, movewindow, d

# Sets repeatable binds for resizing the active window
binde = ALT, h, resizeactive, -25 0
binde = ALT, l, resizeactive, 25 0
binde = ALT, k, resizeactive, 0 -25
binde = ALT, j, resizeactive, 0 25

# Switch workspaces with mod + [0-9]
bind = $mod, g, workspace, 1
bind = $mod, r, workspace, 2
bind = $mod, t, workspace, 3
bind = $mod, s, workspace, 4
bind = $mod, w, workspace, 5

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, g, movetoworkspacesilent, 1
bind = $mod SHIFT, r, movetoworkspacesilent, 2
bind = $mod SHIFT, t, movetoworkspacesilent, 3
bind = $mod SHIFT, s, movetoworkspacesilent, 4
bind = $mod SHIFT, w, movetoworkspacesilent, 5

bind = $mod, TAB, workspace, previous

bind = $mod, n, togglespecialworkspace, notes
bind = $mod, m, togglespecialworkspace, calculator

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Player controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Volume
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%-
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.2 @DEFAULT_SINK@ 5%+

# Backlight
binde = , XF86MonBrightnessDown, exec, ddcutil --skip-ddc-checks --noverify setvcp 10 - 5
binde = , XF86MonBrightnessUp, exec, ddcutil --skip-ddc-checks --noverify setvcp 10 + 5

# Screenshot
bind = $mod, comma, exec, img=~/Pictures/screenshot_$(date +%Y-%m-%d_%Hh%Mm%Ss).png && grim $img && wl-copy < $img && dunstify "Screenshot saved"
bind = $mod, period, exec, img=~/Pictures/screenshot_$(date +%Y-%m-%d_%Hh%Mm%Ss).png && grim -g "$(hyprctl -j activewindow | jq -r '. | "\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" $img && wl-copy < $img && dunstify "Screenshot saved"
bind = $mod, slash, exec, img=~/Pictures/screenshot_$(date +%Y-%m-%d_%Hh%Mm%Ss).png && grim -g "$(slurp -d -w 1 -F "Iosevka Nerd Font")" $img && wl-copy < $img && dunstify "Screenshot saved"


# Clipboard
bind = $mod SHIFT, v, exec, rofi -modi clipboard:~/dotfiles/rofi/.config/rofi/scripts/cliphist-rofi-img -show clipboard -show-icons -theme-str 'window {width: 30%;}'



#            _
